<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Redirecting — Adrichops</title></head><body><p>Redirecting…</p><script>fetch('/data/posts.json').then(r=>r.json()).then(d=>{const id=new URLSearchParams(location.search).get('id')||location.hash.slice(1);const p=(d.posts||[]).find(x=>x.id===id||x.slug===id);location.replace(p?p.route:'/');}).catch(()=>location.replace('/'));</script></body></html>
